<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sobre Nosotros | TrendStore</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .page-header { background: var(--primary-color); color: white; padding: 60px 20px; text-align: center; border-radius: var(--border-radius); margin-top: 20px; }
    .page-content { background: var(--card-background); padding: 40px; border-radius: var(--border-radius); box-shadow: var(--box-shadow); border: 1px solid var(--border-color); margin-top: -30px; position: relative; z-index: 10; line-height: 1.8; font-size: 1.1rem; color: var(--text-color); white-space: pre-line; }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <main class="container py-2">
    <div class="page-header">
      <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 10px;" id="about-title">Cargando...</h1>
    </div>
    
    <div class="page-content" id="about-content">
      <div class="skeleton" style="height: 200px;"></div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="../assets/js/base-path.js"></script>
  <script type="module">
    import { renderHeader } from '../components/header.js';
    import { renderFooter } from '../components/footer.js';
    import { ApiService } from '../services/api.js';
    import '../assets/js/main.js';

    document.addEventListener('DOMContentLoaded', () => {
      renderHeader();
      renderFooter();

      const settings = ApiService.getSettings();
      document.getElementById('about-title').textContent = settings.aboutTitle;
      document.getElementById('about-content').textContent = settings.aboutText;
    });
  </script>
</body>
</html>
