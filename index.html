<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio | TrendStore</title>
  <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
  <div id="header-container"></div>

  <main class="container">
    
    <!-- DYNAMIC SLIDER -->
    <div class="slider-container" id="main-slider">
      <div class="slider-track" id="slider-track">
        <div class="slide skeleton" style="width: 100%; height: 100%;"></div>
      </div>
      <button class="slider-btn slider-prev" id="slider-prev">❮</button>
      <button class="slider-btn slider-next" id="slider-next">❯</button>
      <div class="slider-dots" id="slider-dots"></div>
    </div>

    <!-- RECENT PURCHASES (CONTEXTUAL - ONLY VISIBLE IF LOGGED IN WITH ORDERS) -->
    <section id="recent-purchases-section" class="py-2" style="display: none; margin-top: 20px;">
      <div class="section-header">
        <h2 class="section-title">Tus Últimas Compras</h2>
        <a href="/account/?tab=purchases" class="view-all-link">Ver historial completo</a>
      </div>
      <div id="recent-purchases-container" class="products-grid"></div>
    </section>

    <section class="py-2">
      <div class="section-header">
        <h2 class="section-title">Tendencias Destacadas</h2>
        <a href="/categories/" class="view-all-link">Ver todo</a>
      </div>
      
      <div id="products-container" class="products-grid">
        <div class="product-card skeleton" style="height: 400px;"></div>
        <div class="product-card skeleton" style="height: 400px;"></div>
        <div class="product-card skeleton" style="height: 400px;"></div>
        <div class="product-card skeleton" style="height: 400px;"></div>
      </div>
    </section>
  </main>

  <div id="footer-container"></div>

  <script src="./assets/js/base-path.js"></script>
  <script type="module">
    import { renderHeader } from './components/header.js';
    import { renderFooter } from './components/footer.js';
    import { ApiService } from './services/api.js';
    import { AuthService } from './services/auth.js';
    import { FavoritesService } from './services/favorites.js';
    
    // Exponer servicios globalmente
    window.ApiService = ApiService;
    window.AuthService = AuthService;
    window.FavoritesService = FavoritesService;

    // Cargar main.js después de que los servicios estén disponibles
    const script = document.createElement('script');
    script.src = './assets/js/main.js';
    script.type = 'module';
    document.body.appendChild(script);

    document.addEventListener('DOMContentLoaded', async () => {
      renderHeader();
      renderFooter();

      // --- SLIDER LOGIC ---
      const sliderTrack = document.getElementById('slider-track');
      const dotsContainer = document.getElementById('slider-dots');
      let currentSlide = 0;
      let slideInterval;
      let totalSlides = 0;

      try {
        const sliders = await ApiService.getSliders();
        totalSlides = sliders.length;
        
        sliderTrack.innerHTML = sliders.map(s => `
          <div class="slide" style="background-image: url('${s.image}');">
            <div class="slide-overlay"></div>
            <div class="slide-content">
              <h2 class="slide-title">${s.title}</h2>
              <p class="slide-subtitle">${s.subtitle}</p>
              <a href="${s.link}" class="btn btn-primary slider-cta">${s.buttonText}</a>
            </div>
          </div>
        `).join('');

        dotsContainer.innerHTML = sliders.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" data-index="${i}"></div>`).join('');

        const updateSlider = () => {
          sliderTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
          document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentSlide));
        };

        const nextSlide = () => { currentSlide = (currentSlide + 1) % totalSlides; updateSlider(); };
        const prevSlide = () => { currentSlide = (currentSlide - 1 + totalSlides) % totalSlides; updateSlider(); };

        document.getElementById('slider-next').addEventListener('click', () => { nextSlide(); resetInterval(); });
        document.getElementById('slider-prev').addEventListener('click', () => { prevSlide(); resetInterval(); });
        
        document.querySelectorAll('.dot').forEach(dot => {
          dot.addEventListener('click', (e) => {
            currentSlide = parseInt(e.target.dataset.index);
            updateSlider();
            resetInterval();
          });
        });

        const resetInterval = () => { clearInterval(slideInterval); slideInterval = setInterval(nextSlide, 5000); };
        resetInterval();
      } catch (error) {
        sliderTrack.innerHTML = '<div class="slide" style="background:var(--card-background);"><p>Error cargando promociones</p></div>';
      }

      // --- CONTEXTUAL PURCHASES LOGIC ---
      const user = AuthService.getUser();
      if (user) {
        try {
          const orders = await ApiService.getOrders();
          const userOrders = orders.filter(o => o.customer === user.name);
          
          if (userOrders.length > 0) {
            document.getElementById('recent-purchases-section').style.display = 'block';
            document.getElementById('recent-purchases-container').innerHTML = userOrders.slice(0, 4).map(o => `
              <div class="product-card" style="padding: 20px; display: flex; flex-direction: column; justify-content: center;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                  <div style="width: 45px; height: 45px; background: rgba(79, 70, 229, 0.1); color: var(--primary-color); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">📦</div>
                  <span class="badge ${o.status === 'Completado' ? 'badge-success' : 'badge-warning'}">${o.status}</span>
                </div>
                <h4 style="margin-bottom: 5px; font-size: 1.1rem; color: var(--text-color);">Pedido ${o.id}</h4>
                <p style="color: var(--text-light); font-size: 0.85rem; margin-bottom: 15px;">Fecha: ${o.date}</p>
                <div style="margin-top: auto; border-top: 1px solid var(--border-color); padding-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                  <span style="font-weight: 900; color: var(--text-color); font-size: 1.3rem;">${window.formatPrice(o.total)}</span>
                  <a href="/account/?tab=purchases" class="btn btn-outline btn-sm">Ver Detalle</a>
                </div>
              </div>
            `).join('');
          }
        } catch (error) {
          console.error("Error cargando compras recientes", error);
        }
      }

      // --- PRODUCTS LOGIC ---
      const container = document.getElementById('products-container');
      try {
        const products = await ApiService.getProducts();
        container.innerHTML = products.slice(0, 4).map(p => window.generateProductCardHTML(p)).join('');
      } catch (error) {
        container.innerHTML = '<p style="color: var(--error-color); font-weight: bold;">Error cargando productos.</p>';
      }
    });
  </script>
</body>
</html>
