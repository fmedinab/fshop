<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión | TrendStore</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    .auth-container { max-width: 400px; margin: 40px auto; background: var(--card-background); padding: 40px; border-radius: var(--border-radius); box-shadow: var(--box-shadow); border: 1px solid var(--border-color); }
    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-title { font-size: 1.8rem; font-weight: 800; color: var(--text-color); margin-bottom: 10px; }
    .auth-subtitle { color: var(--text-light); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-color); font-size: 0.9rem; }
    .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--background-color); color: var(--text-color); font-family: inherit; font-size: 1rem; transition: border-color 0.2s; }
    .form-control:focus { outline: none; border-color: var(--primary-color); }
    .btn-auth { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: 600; border: none; background: var(--primary-color); color: white; margin-top: 10px; }
    .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-auth:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .auth-links { margin-top: 20px; text-align: center; font-size: 0.9rem; }
    .auth-links a { color: var(--primary-color); text-decoration: none; font-weight: 600; }
    .auth-links a:hover { text-decoration: underline; }
    .tab-container { display: flex; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; }
    .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: var(--text-light); font-weight: 600; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
    .auth-form { display: none; }
    .auth-form.active { display: block; }
    .error-msg { color: var(--error-color); font-size: 0.85rem; margin-top: 5px; display: none; }
  </style>
</head>
<body>
  <div id="header-container"></div>

  <main class="container py-2">
    <div class="auth-container">
      <div class="auth-header">
        <h1 class="auth-title">Bienvenido</h1>
        <p class="auth-subtitle">Ingresa a tu cuenta para continuar</p>
      </div>

      <div class="tab-container">
        <div class="tab active" id="tab-login">Ingresar</div>
        <div class="tab" id="tab-register">Registrarse</div>
      </div>

      <!-- FORM LOGIN -->
      <form id="form-login" class="auth-form active">
        <div class="form-group">
          <label for="login-email">Correo Electrónico</label>
          <input type="email" id="login-email" class="form-control" required placeholder="ejemplo@correo.com">
        </div>
        
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" class="form-control" required placeholder="••••••••">
          <div id="login-error" class="error-msg">Credenciales incorrectas</div>
        </div>

        <button type="submit" class="btn-auth" id="btn-login">Ingresar</button>
        
        <div class="auth-links" style="margin-top: 15px; text-align: right;">
          <a href="#" style="font-size: 0.85rem; font-weight: normal;">¿Olvidaste tu contraseña?</a>
        </div>
      </form>

      <!-- FORM REGISTRO -->
      <form id="form-register" class="auth-form">
        <div class="form-group">
          <label for="reg-name">Nombre Completo</label>
          <input type="text" id="reg-name" class="form-control" required placeholder="Juan Pérez">
        </div>

        <div class="form-group">
          <label for="reg-email">Correo Electrónico</label>
          <input type="email" id="reg-email" class="form-control" required placeholder="ejemplo@correo.com">
        </div>
        
        <div class="form-group">
          <label for="reg-password">Contraseña</label>
          <input type="password" id="reg-password" class="form-control" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-auth" id="btn-register">Crear Cuenta</button>
      </form>
    </div>
  </main>

  <div id="footer-container"></div>

  <script src="../assets/js/base-path.js"></script>
  <script type="module">
    import { renderHeader } from '../components/header.js';
    import { renderFooter } from '../components/footer.js';
    import { AuthService } from '../services/auth.js';
    
    // Asignar al window ANTES de main
    window.AuthService = AuthService;
    
    const scriptMain = document.createElement('script');
    scriptMain.src = '../assets/js/main.js';
    scriptMain.type = 'module';
    document.body.appendChild(scriptMain);

    document.addEventListener('DOMContentLoaded', () => {
      renderHeader();
      renderFooter();

      // Si ya está logueado, redirigir
      if (AuthService.isLoggedIn()) {
        window.location.href = window.BASE_URL + '/';
      }

      // Tabs Logic
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const formLogin = document.getElementById('form-login');
      const formRegister = document.getElementById('form-register');

      tabLogin.addEventListener('click', () => {
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        formLogin.classList.add('active');
        formRegister.classList.remove('active');
      });

      tabRegister.addEventListener('click', () => {
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        formRegister.classList.add('active');
        formLogin.classList.remove('active');
      });

      // Formularios
      formLogin.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value;
        const pass = document.getElementById('login-password').value;
        const btn = document.getElementById('btn-login');
        const errorMsg = document.getElementById('login-error');
        
        btn.disabled = true;
        btn.textContent = 'Verificando...';
        errorMsg.style.display = 'none';

        const success = await AuthService.login(email, pass);
        
        if (success) {
          window.showToast('Bienvenido de nuevo', 'success');
          // Si es admin, redirigir al panel, sino al inicio
          setTimeout(() => {
            const user = window.AuthService.getUser();
            if (user && (user.role.toLowerCase() === 'admin' || user.role.toLowerCase() === 'superadmin')) {
              window.location.href = window.BASE_URL + '/admin/';
            } else {
              window.location.href = window.BASE_URL + '/';
            }
          }, 1000);
        } else {
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      });

      formRegister.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const pass = document.getElementById('reg-password').value;
        const btn = document.getElementById('btn-register');
        
        btn.disabled = true;
        btn.textContent = 'Creando cuenta...';

        const response = await window.AuthService.register(name, email, pass);
        
        if (response.success) {
          window.showToast('Cuenta creada exitosamente. Por favor, inicia sesión.', 'success');
          setTimeout(() => {
            // Cambiar a la pestaña de login
            tabLogin.click();
            // Llenar el email en el form de login para conveniencia
            document.getElementById('login-email').value = email;
            document.getElementById('login-password').value = '';
            
            // Reactivar botón y resetear form (opcional)
            btn.disabled = false;
            btn.textContent = 'Crear Cuenta';
            formRegister.reset();
          }, 1500);
        } else {
          window.showToast(response.error || 'Error al crear la cuenta. Intente otro correo.', 'error');
          btn.disabled = false;
          btn.textContent = 'Crear Cuenta';
        }
      });
    });
  </script>
</body>
</html>
