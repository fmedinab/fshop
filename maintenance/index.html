<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantenimiento | TrendStore</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--background-color); margin: 0; }
    .maintenance-container { text-align: center; background: var(--card-background); padding: 60px 40px; border-radius: var(--border-radius); box-shadow: var(--box-shadow); border: 1px solid var(--border-color); max-width: 600px; width: 90%; }
    .icon { font-size: 5rem; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
    h1 { font-size: 2.5rem; color: var(--text-color); margin-bottom: 15px; font-weight: 900; }
    p { color: var(--text-light); font-size: 1.1rem; line-height: 1.6; margin-bottom: 30px; }
  </style>
</head>
<body>
  <div class="maintenance-container">
    <div class="icon">🛠️</div>
    <h1>Volvemos Pronto</h1>
    <p>Nuestra tienda está actualmente en mantenimiento para traerte una mejor experiencia y nuevas ofertas. Estaremos en línea nuevamente en breve.</p>
    <div style="display: flex; justify-content: center; gap: 15px;">
      <a href="../admin/" class="btn btn-outline">Acceso Admin</a>
    </div>
  </div>
  
  <script src="../assets/js/base-path.js"></script>
  <script type="module">
    import { ApiService } from '../services/api.js';
    window.ApiService = ApiService;
    // Si el mantenimiento se desactiva, redirigir automáticamente al inicio
    setInterval(() => {
      const settings = window.ApiService.getSettings();
      if (!settings.maintenanceMode) {
        window.location.href = '../';
      }
    }, 5000);
  </script>
</body>
</html>
